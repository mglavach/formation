  /* Identity */
  {
    id: 'greeting',
    tags: ['hello', 'hi barnabee', 'hey', 'good morning', 'good afternoon', 'hi there', 'howdy'],
    reply: `<p>Hello! I'm so glad you're here! I'm <strong>Barnabee</strong>, your Bible study friend at Westminster.</p>

    reply: `<p>I'm <strong>Barnabee</strong>, your Bible Study Companion at Westminster Christian School!</p>
<p>I'm named after <strong>Barnabas</strong>, a man in the New Testament whose name means <em>"Son of Encouragement."</em> Barnabas is famous for cheering people on, giving second chances, and helping others grow in their faith. That's exactly what I love to do!</p>
<p>I can help you:</p>
<ul>
  <li>Practice and memorize Bible verses</li>
  <li>Learn the Books of the Bible</li>
  <li>Explore amazing Bible stories</li>
  <li>Study the Fruit of the Spirit</li>
  <li>Get ready for Rooted</li>
  <li>Discover this year's chapel theme, Echoes of Eden</li>
</ul>
<div class="verse-pull">"I have hidden your word in my heart that I might not sin against you."<cite>Psalm 119:11</cite></div>
<p class="follow-up">Pick a challenge and let's get started! You've got this!</p>`
  },
  {
    id: 'barnabas',
    tags: ['barnabas', 'who was barnabas', 'barnabas in the bible', 'son of encouragement', 'acts barnabas', 'tell me about barnabas'],
    reply: `<p><strong>Barnabas</strong> is one of the most encouraging people in the whole New Testament!</p>
<p>His real name was Joseph, but the apostles gave him the nickname <strong>Barnabas</strong>, which means <em>"Son of Encouragement"</em> in Aramaic. (Acts 4:36)</p>
<p>Here's what made Barnabas special:</p>
<ul>
  <li><strong>Generosity:</strong> He sold a field and gave ALL the money to help others in the church (Acts 4:37)</li>
  <li><strong>Courage:</strong> When everyone was afraid of Paul after his conversion, Barnabas stood up for him and brought him to the apostles (Acts 9:27)</li>
  <li><strong>Second chances:</strong> He believed in John Mark even when Paul gave up on him, and John Mark went on to write the Gospel of Mark!</li>
  <li><strong>Mission:</strong> He traveled with Paul on the very first missionary journey, spreading the Good News</li>
</ul>
<div class="verse-pull">"He was a good man, full of the Holy Spirit and faith, and a great number of people were brought to the Lord."<cite>Acts 11:24</cite></div>
<p class="follow-up">Barnabas shows us that encouragement is one of the most powerful things you can do for someone. Want to learn more about Acts or the early church?</p>`
  },

  /* Books of the Bible */
  {
    id: 'books_quiz',
    tags: ['books of the bible', 'quiz me', 'books quiz', 'old testament books', 'new testament books', 'name the books', 'books in order'],
    reply: `<p>Let's explore the <strong>Books of the Bible</strong>! The Bible has <strong>66 books</strong> total: 39 in the Old Testament and 27 in the New Testament.</p>
<p><strong>Old Testament sections:</strong></p>
<ul>
  <li><strong>The Law (5 books):</strong> Genesis, Exodus, Leviticus, Numbers, Deuteronomy</li>
  <li><strong>History (12 books):</strong> Joshua through Esther</li>
  <li><strong>Poetry (5 books):</strong> Job, Psalms, Proverbs, Ecclesiastes, Song of Solomon</li>
  <li><strong>Prophets (17 books):</strong> Isaiah through Malachi</li>
</ul>
<p><strong>New Testament sections:</strong></p>
<ul>
  <li><strong>Gospels (4):</strong> Matthew, Mark, Luke, John</li>
  <li><strong>History (1):</strong> Acts</li>
  <li><strong>Letters (21):</strong> Romans through Jude</li>
  <li><strong>Prophecy (1):</strong> Revelation</li>
</ul>
<p class="follow-up">Want me to quiz you on a section? Try asking "Quiz me on the Gospels" or "What are the books of the Law?"</p>`
  },
  {
    id: 'gospels',
    tags: ['gospels', 'four gospels', 'matthew mark luke john', 'quiz gospels', 'names of gospels'],
    reply: `<p>The <strong>Four Gospels</strong> tell the story of Jesus! Can you name them?</p>
<p>Ready? The four Gospels are:</p>
<ul>
  <li><strong>Matthew</strong> - Written for Jewish readers, shows Jesus as King</li>
  <li><strong>Mark</strong> - The shortest Gospel, full of action and miracles</li>
  <li><strong>Luke</strong> - Written by a doctor, shows Jesus caring for everyone</li>
  <li><strong>John</strong> - "The beloved disciple" wrote this one, focuses on who Jesus IS</li>
</ul>
<div class="verse-pull">"For God so loved the world that he gave his one and only Son, that whoever believes in him shall not perish but have eternal life."<cite>John 3:16</cite></div>
<p class="follow-up">Can you name all four Gospels from memory now? Want to try another section?</p>`
  },
  {
    id: 'books_law',
    tags: ['books of the law', 'first five books', 'pentateuch', 'genesis exodus leviticus numbers deuteronomy', 'five books of moses'],
    reply: `<p>The first five books of the Bible are called <strong>The Law</strong> or the Pentateuch (that's a big word that means "five scrolls").</p>
<ul>
  <li><strong>1. Genesis</strong> - The beginning of everything: creation, the fall, Noah, Abraham</li>
  <li><strong>2. Exodus</strong> - Moses leads God's people out of Egypt</li>
  <li><strong>3. Leviticus</strong> - God's laws and instructions for worship</li>
  <li><strong>4. Numbers</strong> - 40 years of wandering in the wilderness</li>
  <li><strong>5. Deuteronomy</strong> - Moses reminds the people of God's commands</li>
</ul>
<p class="follow-up">Can you say all five in order? Genesis, Exodus, Leviticus, Numbers, Deuteronomy. Try it!</p>`
  },

  /* Verse memorization */
  {
    id: 'memorize_verse',
    tags: ['memorize', 'memory verse', 'help me memorize', 'how to memorize', 'remember a verse', 'verse of the week', 'practice verse'],
    reply: `<p>Memorizing Bible verses is one of the best things you can do! Here are Olive's favorite tips:</p>
<ul>
  <li><strong>Say it out loud</strong> - Read the verse aloud 3 times in a row</li>
  <li><strong>Chunk it</strong> - Break the verse into small pieces and learn one piece at a time</li>
  <li><strong>Sing it</strong> - Make up a little tune. Songs stick in your brain!</li>
  <li><strong>Write it</strong> - Write the verse on a card and put it somewhere you'll see it</li>
  <li><strong>Teach it</strong> - Say the verse to a parent or friend. Teaching helps you remember!</li>
</ul>
<div class="verse-pull">"I have hidden your word in my heart that I might not sin against you."<cite>Psalm 119:11</cite></div>
<p class="follow-up">Tell me a verse you're working on and I'll help you practice it!</p>`
  },
  {
    id: 'psalm_119',
    tags: ['psalm 119', 'psalm 119:11', 'hidden your word', 'hide your word', 'heart verse'],
    reply: `<p>That's one of Olive's favorite verses! Here it is:</p>
<div class="verse-pull">"I have hidden your word in my heart that I might not sin against you."<cite>Psalm 119:11</cite></div>
<p>This verse tells us that when we memorize Scripture, God's Word lives <em>inside</em> us. It helps us make good choices, even when no one is watching.</p>
<p>Try memorizing it in two parts:</p>
<ul>
  <li>Part 1: "I have hidden your word in my heart..."</li>
  <li>Part 2: "...that I might not sin against you."</li>
</ul>
<p class="follow-up">Can you say the whole verse now? You've got this!</p>`
  },
  {
    id: 'john_316',
    tags: ['john 3:16', 'john 3 16', 'god so loved the world', 'for god so loved'],
    reply: `<p>John 3:16 is one of the most famous verses in the whole Bible!</p>
<div class="verse-pull">"For God so loved the world that he gave his one and only Son, that whoever believes in him shall not perish but have eternal life."<cite>John 3:16</cite></div>
<p>Let's break it down:</p>
<ul>
  <li><strong>"For God so loved the world"</strong> - God loves every single person, including YOU</li>
  <li><strong>"that he gave his one and only Son"</strong> - Jesus came because of God's love</li>
  <li><strong>"that whoever believes in him"</strong> - That means anyone who trusts in Jesus</li>
  <li><strong>"shall not perish but have eternal life"</strong> - We get to be with God forever!</li>
</ul>

  {
    id: 'eccl_311',
    tags: ['ecclesiastes 3:11', 'ecclesiastes 3 11', 'beautiful in its time', 'eternity in the human heart', 'verse of the year', 'echoes of eden verse'],
    reply: `<p>That's Westminster's <strong>Verse of the Year</strong> for 2026-27!</p>
<div class="verse-pull">"God has made everything beautiful in its time. He has also set eternity in the human heart; yet no one can fathom what God has done from beginning to end."<cite>Ecclesiastes 3:11</cite></div>
<p>This verse tells us some amazing things:</p>
<ul>
  <li>God makes <em>everything</em> beautiful, even things that feel hard right now</li>
  <li>God has put a longing for forever inside every one of us</li>
  <li>God's plan is too wonderful for us to fully understand, and that's okay!</li>
</ul>
<p class="follow-up">Can you say Ecclesiastes 3:11 from memory? Break it into two pieces and try!</p>`
  },

  /* Fruit of the Spirit */
  {
    id: 'fruit_spirit',
    tags: ['fruit of the spirit', 'fruits of the spirit', 'galatians 5', 'love joy peace', 'what are the fruits', 'nine fruits', 'spirit fruits'],
    reply: `<p>The <strong>Fruit of the Spirit</strong> comes from Galatians 5:22-23. These are 9 qualities that grow in us when we walk with God!</p>
<ul>
  <li><strong>Love</strong> - Caring deeply for God and others</li>
  <li><strong>Joy</strong> - A happiness that doesn't depend on things going perfectly</li>
  <li><strong>Peace</strong> - Calm and trust even when life is hard</li>
  <li><strong>Patience</strong> - Waiting without getting frustrated</li>
  <li><strong>Kindness</strong> - Being gentle and good to others</li>
  <li><strong>Goodness</strong> - Choosing what's right even when it's hard</li>
  <li><strong>Faithfulness</strong> - Keeping your promises and being trustworthy</li>
  <li><strong>Gentleness</strong> - Being humble and soft-spoken</li>
  <li><strong>Self-control</strong> - Choosing wisely even when you don't feel like it</li>

<div class="verse-pull">"But the fruit of the Spirit is love, joy, peace, forbearance, kindness, goodness, faithfulness, gentleness and self-control."<cite>Galatians 5:22-23</cite></div>
<p class="follow-up">Can you name all nine? Love, Joy, Peace... keep going!</p>`
  },

  /* Echoes of Eden */
  {
    id: 'echoes_eden',
    tags: ['echoes of eden', 'chapel theme', 'this year theme', '2026 theme', 'eden and ed', 'meet eden and ed', 'echoes'],
    reply: `<p>This year's chapel theme is <strong>Echoes of Eden</strong>!</p>
<p>The idea is that our whole world, both the beautiful parts and the broken parts, finds its beginning in the story of <strong>Genesis 1-3</strong>. When we look around us, we can see "echoes" of what God created in the beginning.</p>
<p>You'll get to follow <strong>Eden and Ed</strong>, two sheep siblings who experience life just like you do, sometimes doing the right thing and sometimes not, to help us understand these big truths in a fun way.</p>
<div class="verse-pull">"God has made everything beautiful in its time."<cite>Ecclesiastes 3:11</cite></div>
<p><strong>Three big ideas to remember:</strong></p>
<ul>
  <li>God created the world as <em>good and beautiful</em></li>
  <li>Sin broke things, but God had a plan</li>
  <li>Jesus came to fix what sin broke!</li>
</ul>
<p class="follow-up">Want to learn more about Genesis 1-3 or about Eden and Ed?</p>`
  },
  {
    id: 'creation',
    tags: ['creation', 'genesis 1', 'in the beginning', 'god created', 'seven days', 'six days', 'day one', 'what did god create'],
    reply: `<p>The story of <strong>Creation</strong> is in Genesis 1 and 2. In six days, God made everything!</p>
<ul>
  <li><strong>Day 1</strong> - Light (and dark)</li>
  <li><strong>Day 2</strong> - Sky and water</li>
  <li><strong>Day 3</strong> - Land, seas, and plants</li>
  <li><strong>Day 4</strong> - Sun, moon, and stars</li>
  <li><strong>Day 5</strong> - Birds and fish</li>
  <li><strong>Day 6</strong> - Animals and people (Adam and Eve!)</li>
  <li><strong>Day 7</strong> - God rested and called it holy</li>
</ul>
<div class="verse-pull">"In the beginning God created the heavens and the earth."<cite>Genesis 1:1</cite></div>
<p class="follow-up">Can you name all 7 days of creation? Try it! And want to learn about Adam and Eve next?</p>`
  },
  {
    id: 'adam_eve',
    tags: ['adam and eve', 'garden of eden', 'the fall', 'forbidden fruit', 'serpent', 'adam eve snake', 'original sin'],
    reply: `<p>God created <strong>Adam and Eve</strong> and placed them in the beautiful Garden of Eden. Everything was perfect!</p>
<p>God gave them one rule: do not eat from the Tree of the Knowledge of Good and Evil.</p>
<p>But a sneaky serpent came and tricked Eve into thinking it would be okay. She ate the fruit, and Adam did too. This was called <strong>the Fall</strong>.</p>
<p>Because of their choice, sin and sadness entered the world. But even then, God showed his love by making a promise: one day, Someone would come to make things right.</p>
<p>That Someone was <strong>Jesus!</strong></p>
<div class="verse-pull">"For God so loved the world that he gave his one and only Son."<cite>John 3:16</cite></div>
<p class="follow-up">This is the start of the Echoes of Eden story! Want to learn about Noah or another Bible story?</p>`
  },

  {

    reply: `<p>The Bible is full of amazing stories! Here are some I can tell you about:</p>

  <li><strong>David and Goliath</strong> - A small boy with big faith</li>
  <li><strong>Daniel in the Lion's Den</strong> - Courage when it's scary</li>
  <li><strong>Jonah and the Whale</strong> - Running away from God doesn't work</li>
  <li><strong>The Birth of Jesus</strong> - The greatest gift ever given</li>
  <li><strong>Jesus Feeds 5,000</strong> - A little becomes a lot</li>
  <li><strong>Easter</strong> - Jesus rose from the dead!</li>
</ul>
<p class="follow-up">Which story would you like to hear? Just ask!</p>`

  {
    id: 'noah',
    tags: ['noah', 'noah ark', 'noahs ark', 'flood', 'rainbow', 'noah and the ark', 'animals two by two'],
    reply: `<p>The story of <strong>Noah and the Ark</strong> is in Genesis 6-9!</p>
<p>The world had become very sinful, but Noah loved and obeyed God. So God gave Noah a big job: build a giant boat called an <strong>ark</strong>. Noah brought two of every kind of animal on board.</p>
<p>It rained for 40 days and 40 nights. The whole earth flooded. But Noah, his family, and all the animals were safe on the ark.</p>

/* Scoring engine */
function score(entry, q) {
  if (!entry.tags.length) return -1;
  return entry.tags.reduce((n, t) => n + (q.includes(t) ? 1 : 0), 0);
}

function getBestReply(q) {
  q = q.toLowerCase();
  let best = KB[KB.length - 1], bestScore = 0;
  for (const e of KB) {
    const s = score(e, q);
    if (s > bestScore) { bestScore = s; best = e; }
  }
  return best.reply;
}

/* UI helpers */
function addMsg(html, role) {
  const body = document.getElementById('chatBody');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  const av = document.createElement('div');
  av.className = 'msg-av';
  if (role === 'olive') av.innerHTML = '<img src="Barnabee.png" alt="Barnabee" />';
  else { av.textContent = 'Me'; }
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = html;
  row.appendChild(av);
  row.appendChild(bubble);
  body.appendChild(row);
  body.scrollTop = body.scrollHeight;
}

function typing() {
  const body = document.getElementById('chatBody');
  const row = document.createElement('div');
  row.className = 'msg-row olive'; row.id = 'typing';
  row.innerHTML = '<div class="msg-av" style="overflow:hidden;"><img src="Barnabee.png" alt="Barnabee" style="width:100%;height:100%;object-fit:cover;display:block;" /></div><div class="msg-bubble" style="color:var(--muted);font-style:italic;font-size:0.82rem;">Barnabee is thinking...</div>';
  body.appendChild(row);
  body.scrollTop = body.scrollHeight;
}

function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

function send(text) {
  if (!text.trim()) return;
  addMsg('<p>' + text.replace(/</g,'&lt;') + '</p>', 'user');
  document.getElementById('userInput').value = '';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('quickWrap').style.display = 'none';
  typing();
  setTimeout(() => {
    removeTyping();
    addMsg(getBestReply(text), 'olive');
    document.getElementById('sendBtn').disabled = false;
  }, 600 + Math.random() * 400);
}

function sendQuick(t) { send(t); }

/* Input events */
document.getElementById('sendBtn').addEventListener('click', () => send(document.getElementById('userInput').value));
document.getElementById('userInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(document.getElementById('userInput').value); }
});
document.getElementById('userInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 110) + 'px';
});

/* Opening message */
window.addEventListener('load', () => {
  setTimeout(() => {
    addMsg(`<p>Hi! I'm <strong>Barnabee</strong>, your Bible study friend at Westminster!</p>
<p>I'm named after Barnabas, the <em>Son of Encouragement</em> from Acts. He cheered people on, gave second chances, and helped others grow in faith. That's my job here too!</p>
<p>I can help you memorize verses, explore Bible stories, learn the Books of the Bible, and get ready for Rooted.</p>
<div class="verse-pull">"I have hidden your word in my heart that I might not sin against you."<cite>Psalm 119:11</cite></div>
<p class="follow-up">What would you like to do today? You've got this!</p>`, 'olive');
  }, 300);
});
</script>
